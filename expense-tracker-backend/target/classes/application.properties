# Server Port
server.port=8080

# Spring Application Name
spring.application.name=expense-tracker-backend

# Database Configuration (Defaults to MySQL, includes fallback settings)
spring.datasource.url=jdbc:mysql://localhost:3306/expense_tracker_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# H2 Database configuration for testing/local-development when MySQL is not running (uncomment to switch)
# spring.datasource.url=jdbc:h2:mem:expensedb;DB_CLOSE_DELAY=-1
# spring.datasource.driverClassName=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console

# Hibernate/JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Settings
app.jwt-secret=9a67471b796dcd37c15e8b3554e2bdf27a7493a745585973c15383a15483a1542
app.jwt-expiration-milliseconds=604800000

# File Upload Settings
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# OpenAPI/Swagger Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Logging Settings
logging.level.org.springframework.web=INFO
logging.level.com.expensetracker=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
